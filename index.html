<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Two Off the Tee — Leaderboard</title>
<link rel="stylesheet" href="css/style.css">
</head>
<body>

<header class="site-header">
  <div class="header-inner">
    <a href="index.html" class="brand">Two Off the Tee <span class="brand-mark">HDCP</span></a>
    <nav class="site-nav">
      <a href="index.html">Leaderboard</a>
      <a href="round-entry.html">Log a Round</a>
      <a href="solo-rounds.html">Solo Rounds</a>
    </nav>
    <div class="auth-area" id="auth-area"></div>
  </div>
</header>

<main>

  <div data-requires-signed-out class="login-gate card">
    <div class="glyph">⛳</div>
    <h1>Two Off the Tee</h1>
    <p class="page-sub">Sign in to see the season standings.</p>
  </div>

  <div data-requires-auth style="display:none;">
    <div class="page-eyebrow">Season standings</div>
    <h1 class="page-title">Head to Head</h1>
    <p class="page-sub">All handicapped rounds played together this year, scored across every format you've logged.</p>

    <div id="h2h-banner-slot"></div>
    <div id="format-grid-slot"></div>

    <div class="section-head">
      <h2>Round history</h2>
    </div>
    <div class="card" id="round-history-slot">
      <p class="loading-line">Loading rounds…</p>
    </div>
  </div>

</main>

<script type="module" src="js/firebase-config.js"></script>
<script type="module" src="js/app.js"></script>
<script type="module" src="js/leaderboard.js"></script>
</body>
</html>
